name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, staging, 'feat/**']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      deploy-url: ${{ steps.deploy.outputs.url }}
    permissions:
      contents: read
      deployments: write
    env:
      AWS_PROFILE: sops-ri
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install SOPS
        run: |
          SOPS_VERSION="v3.9.4"
          curl -L -o /tmp/sops "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64"
          chmod +x /tmp/sops
          sudo mv /tmp/sops /usr/local/bin/sops
          sops --version

      - name: Configure AWS credentials for SOPS
        run: |
          mkdir -p ~/.aws
          echo "[sops-ri]" >> ~/.aws/credentials
          echo "aws_access_key_id = ${{ vars.SOPS_AWS_ACCESS_KEY_ID }}" >> ~/.aws/credentials
          echo "aws_secret_access_key = ${{ secrets.SOPS_AWS_SECRET_ACCESS_KEY }}" >> ~/.aws/credentials
          echo "[profile sops-ri]" >> ~/.aws/config
          echo "region = us-east-1" >> ~/.aws/config

      - name: Determine secrets file
        id: secrets
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "file=secrets/github.env" >> $GITHUB_OUTPUT
          else
            echo "file=secrets/github-preview.env" >> $GITHUB_OUTPUT
          fi

      - name: Build
        run: |
          sops exec-env "${{ steps.secrets.outputs.file }}" \
            "pnpm build"

      - name: Deploy to Cloudflare Pages
        id: deploy
        run: |
          DEPLOY_OUTPUT=$(sops exec-env "${{ steps.secrets.outputs.file }}" \
            "pnpm dlx wrangler pages deploy out --project-name=koi-docs --branch=${{ github.head_ref || github.ref_name }}" 2>&1)
          echo "$DEPLOY_OUTPUT"
          DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[a-z0-9-]+\.koi-docs\.pages\.dev' | tail -1)
          if [ -z "$DEPLOY_URL" ]; then
            DEPLOY_URL=$(echo "$DEPLOY_OUTPUT" | grep -oP 'https://[^\s]+\.pages\.dev' | tail -1)
          fi
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Notify Slack (success)
        if: success()
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          DEPLOY_URL="${{ steps.deploy.outputs.url }}"
          REPO_URL="https://github.com/${{ github.repository }}"
          RUN_URL="${REPO_URL}/actions/runs/${{ github.run_id }}"

          if [ "$BRANCH" = "main" ]; then
            SITE_URL="https://docs.koi.eco"
            ENV_LABEL="production"
          else
            SITE_URL="$DEPLOY_URL"
            ENV_LABEL="preview"
          fi

          sops exec-env "${{ steps.secrets.outputs.file }}" "curl -s -X POST \${SLACK_WEBHOOK_URL} \
            -H 'Content-type: application/json' \
            -d '{
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \":white_check_mark: *koi-docs* deployed to *${ENV_LABEL}*\n\n*Branch:* \`${BRANCH}\`\n*Commit:* <${REPO_URL}/commit/${COMMIT_SHA}|${SHORT_SHA}> ${COMMIT_MSG}\"
                  }
                },
                {
                  \"type\": \"actions\",
                  \"elements\": [
                    {
                      \"type\": \"button\",
                      \"text\": { \"type\": \"plain_text\", \"text\": \":globe_with_meridians: View Site\" },
                      \"url\": \"${SITE_URL}\"
                    },
                    {
                      \"type\": \"button\",
                      \"text\": { \"type\": \"plain_text\", \"text\": \":github: Build Log\" },
                      \"url\": \"${RUN_URL}\"
                    }
                  ]
                }
              ]
            }'"

      - name: Notify Slack (failure)
        if: failure()
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:7}"
          REPO_URL="https://github.com/${{ github.repository }}"
          RUN_URL="${REPO_URL}/actions/runs/${{ github.run_id }}"

          sops exec-env "${{ steps.secrets.outputs.file }}" "curl -s -X POST \${SLACK_WEBHOOK_URL} \
            -H 'Content-type: application/json' \
            -d '{
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \":x: *koi-docs* deploy *failed*\n\n*Branch:* \`${BRANCH}\`\n*Commit:* <${REPO_URL}/commit/${COMMIT_SHA}|${SHORT_SHA}> ${COMMIT_MSG}\"
                  }
                },
                {
                  \"type\": \"actions\",
                  \"elements\": [
                    {
                      \"type\": \"button\",
                      \"text\": { \"type\": \"plain_text\", \"text\": \":github: Build Log\" },
                      \"url\": \"${RUN_URL}\"
                    }
                  ]
                }
              ]
            }'"

  lighthouse:
    needs: deploy
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      AWS_PROFILE: sops-ri
    steps:
      - uses: actions/checkout@v4

      - name: Install SOPS
        run: |
          SOPS_VERSION="v3.9.4"
          curl -L -o /tmp/sops "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64"
          chmod +x /tmp/sops
          sudo mv /tmp/sops /usr/local/bin/sops

      - name: Configure AWS credentials for SOPS
        run: |
          mkdir -p ~/.aws
          echo "[sops-ri]" >> ~/.aws/credentials
          echo "aws_access_key_id = ${{ vars.SOPS_AWS_ACCESS_KEY_ID }}" >> ~/.aws/credentials
          echo "aws_secret_access_key = ${{ secrets.SOPS_AWS_SECRET_ACCESS_KEY }}" >> ~/.aws/credentials
          echo "[profile sops-ri]" >> ~/.aws/config
          echo "region = us-east-1" >> ~/.aws/config

      - name: Determine secrets file
        id: secrets
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "file=secrets/github.env" >> $GITHUB_OUTPUT
          else
            echo "file=secrets/github-preview.env" >> $GITHUB_OUTPUT
          fi

      - name: Determine audit URL
        id: url
        run: |
          DEPLOY_URL="${{ needs.deploy.outputs.deploy-url }}"
          if [ "${{ github.ref_name }}" = "main" ]; then
            AUDIT_URL="https://docs.koi.eco"
          elif [ -n "$DEPLOY_URL" ]; then
            AUDIT_URL="$DEPLOY_URL"
          else
            AUDIT_URL="https://staging.koi-docs.pages.dev"
          fi
          echo "audit_url=$AUDIT_URL" >> $GITHUB_OUTPUT
          echo "Auditing: $AUDIT_URL"

      - name: Lighthouse (desktop)
        id: lh-desktop
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ steps.url.outputs.audit_url }}
            ${{ steps.url.outputs.audit_url }}/docs/getting-started
            ${{ steps.url.outputs.audit_url }}/docs/getting-started/quickstart
          configPath: ./lighthouserc-desktop.json
          uploadArtifacts: true
          artifactName: lighthouse-desktop
          temporaryPublicStorage: true

      - name: Save desktop results
        run: cp .lighthouseci/manifest.json /tmp/manifest-desktop.json

      - name: Lighthouse (mobile)
        id: lh-mobile
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ steps.url.outputs.audit_url }}
            ${{ steps.url.outputs.audit_url }}/docs/getting-started
            ${{ steps.url.outputs.audit_url }}/docs/getting-started/quickstart
          configPath: ./lighthouserc-mobile.json
          uploadArtifacts: true
          artifactName: lighthouse-mobile
          temporaryPublicStorage: true

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const desktop = JSON.parse(fs.readFileSync('/tmp/manifest-desktop.json', 'utf8'));
            const mobile = JSON.parse(fs.readFileSync('.lighthouseci/manifest.json', 'utf8'));

            const score = (v) => Math.round((v || 0) * 100);
            const icon = (v) => v >= 0.9 ? '\u{1F7E2}' : v >= 0.5 ? '\u{1F7E0}' : '\u{1F534}';
            const fmt = (v) => `${icon(v)} ${score(v)}`;
            const pagePath = (url) => {
              try { const p = new URL(url).pathname; return p === '/' ? '/' : p; }
              catch { return url; }
            };

            let body = '## Lighthouse Results\n\n';
            body += '| Preset | Page | Perf | A11y | Best Practices | SEO |\n';
            body += '| --- | --- | --- | --- | --- | --- |\n';

            for (const e of desktop) {
              const s = e.summary;
              body += `| Desktop | \`${pagePath(e.url)}\` | ${fmt(s.performance)} | ${fmt(s.accessibility)} | ${fmt(s['best-practices'])} | ${fmt(s.seo)} |\n`;
            }
            for (const e of mobile) {
              const s = e.summary;
              body += `| Mobile | \`${pagePath(e.url)}\` | ${fmt(s.performance)} | ${fmt(s.accessibility)} | ${fmt(s['best-practices'])} | ${fmt(s.seo)} |\n`;
            }

            body += '\n_Full HTML reports available in the workflow run artifacts._';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes('## Lighthouse Results'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

